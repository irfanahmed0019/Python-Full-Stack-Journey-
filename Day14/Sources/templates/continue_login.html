<body class="min-h-screen flex flex-col bg-surface overflow-x-hidden">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-on-surface w-full py-stack-md flex justify-center items-center w-full px-margin-mobile md:px-margin-desktop">
<div class="max-w-[1200px] w-full flex justify-center">
<div class="font-display text-headline-md font-bold text-primary dark:text-primary-fixed cursor-pointer transition-all duration-200 hover:opacity-80 transition-opacity">
                #Store</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center px-margin-mobile py-stack-lg">
<div class="w-full max-w-[350px] space-y-stack-md">
<!-- Auth Card -->
<div class="bg-surface-container-lowest p-stack-lg border border-outline-variant rounded-lg shadow-none">
<h1 class="font-display text-headline-lg-mobile md:text-headline-lg text-on-surface mb-stack-sm">
                    Welcome back</h1>
<!-- Email Context -->
<div class="flex items-center gap-1 font-body-sm text-body-sm mb-stack-lg">
<span class="text-on-surface">irfan@example.com</span>
<button class="text-primary hover:underline font-medium cursor-pointer" style="transform: scale(1);">Change</button>
</div>
<form class="space-y-stack-md" onsubmit="event.preventDefault();">
<!-- Password Field -->
<div class="space-y-1">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<a class="text-primary font-label-sm text-label-sm hover:underline" href="#">Forgot Password?</a>
</div>
<input class="w-full border border-outline-variant rounded px-3 py-2 font-body-md text-body-md form-input-focus transition-all duration-200" id="password" name="password" placeholder="Enter your password" type="password">
</div>
<!-- Action Button -->
<button class="w-full bg-primary-container text-on-primary-container py-2.5 rounded-lg font-label-md text-label-md hover:bg-primary transition-colors font-semibold shadow-sm" type="submit" style="transform: scale(1);">
                        Sign In
                    </button>
<!-- Remember Me -->
<div class="flex items-center gap-2 pt-1">
<input class="w-4 h-4 text-primary border-outline-variant rounded focus:ring-primary" id="remember" name="remember" type="checkbox">
<label class="font-body-sm text-body-sm text-on-surface-variant cursor-pointer" for="remember">Keep me signed in</label>
</div>
</form>
<!-- Divider -->
<div class="relative py-stack-lg">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center text-label-sm">
<span class="bg-surface-container-lowest px-2 text-on-surface-variant uppercase tracking-wider">or</span>
</div>
</div>
<!-- Social Login -->
<button class="w-full flex items-center justify-center gap-stack-md border border-outline-variant py-2.5 rounded-lg font-label-md text-label-md hover:bg-surface-container-low transition-colors cursor-pointer group">
<svg class="w-5 h-5" viewBox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="text-on-surface font-medium">Continue with Google</span>
</button>
</div>
<!-- New User Suggestion -->
<div class="text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    Don't have an account? <a class="text-primary hover:underline font-medium" href="#">Create your #Store account</a>
</p>
</div>
</div>
</main>
<!-- Footer -->
<footer class="bg-surface dark:bg-on-surface border-t border-outline-variant dark:border-outline w-full py-stack-lg flex flex-col items-center gap-stack-sm mt-auto">
<div class="flex flex-wrap justify-center gap-stack-lg">
<a class="font-body-sm text-body-sm text-on-surface-variant dark:text-outline-variant hover:text-primary dark:hover:text-primary-fixed underline transition-all cursor-pointer" href="#">Conditions of Use</a>
<a class="font-body-sm text-body-sm text-on-surface-variant dark:text-outline-variant hover:text-primary dark:hover:text-primary-fixed underline transition-all cursor-pointer" href="#">Privacy Notice</a>
<a class="font-body-sm text-body-sm text-on-surface-variant dark:text-outline-variant hover:text-primary dark:hover:text-primary-fixed underline transition-all cursor-pointer" href="#">Help</a>
</div>

</footer>
