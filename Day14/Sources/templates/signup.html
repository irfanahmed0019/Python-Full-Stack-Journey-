<body class="flex flex-col min-h-screen">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-on-surface w-full py-stack-md flex justify-center items-center px-margin-mobile md:px-margin-desktop">
<div class="flex flex-col items-center gap-1">
<span class="font-display text-headline-md font-bold text-primary dark:text-primary-fixed cursor-pointer hover:opacity-80 transition-opacity">#Store</span>
</div>
</header>
<!-- Main Content: Registration Card -->
<main class="flex-grow flex items-center justify-center py-stack-lg px-margin-mobile">
<div class="w-full max-w-[400px]">
<div class="bg-surface-container-lowest p-8 border border-outline-variant shadow-sm rounded-lg">
<h1 class="font-display text-headline-lg mb-stack-lg text-on-surface">Create account</h1>
<form class="space-y-stack-md">
<!-- Your Name -->
<div class="flex flex-col gap-1.5">
<label class="font-label-md text-label-md text-on-surface" for="name">Full name</label>
<input class="w-full px-3 py-2 border border-outline-variant rounded bg-surface focus-ring font-body-md text-body-md" id="name" name="name" placeholder="First and last name" required="" type="text">
</div>
<!-- Email -->
<div class="flex flex-col gap-1.5">
<label class="font-label-md text-label-md text-on-surface" for="email">Email</label>
<input class="w-full px-3 py-2 border border-outline-variant rounded bg-surface focus-ring font-body-md text-body-md" id="email" name="email" required="" type="email">
</div>
<!-- Password -->
<div class="flex flex-col gap-1.5">
<label class="font-label-md text-label-md text-on-surface" for="password">Password</label>
<input class="w-full px-3 py-2 border border-outline-variant rounded bg-surface focus-ring font-body-md text-body-md" id="password" name="password" placeholder="At least 6 characters" required="" type="password">
<div class="flex items-center gap-1.5 text-on-surface-variant">
<span class="material-symbols-outlined text-[16px]">info</span>
<span class="font-body-sm text-body-sm">Passwords must be at least 6 characters.</span>
</div>
</div>
<!-- Re-enter Password -->
<div class="flex flex-col gap-1.5 pb-stack-sm">
<label class="font-label-md text-label-md text-on-surface" for="password_check">Confirm Password</label>
<input class="w-full px-3 py-2 border border-outline-variant rounded bg-surface focus-ring font-body-md text-body-md" id="password_check" name="password_check" required="" type="password">
</div>
<!-- Submit Button -->
<button class="w-full bg-primary-container hover:bg-primary-container/90 text-on-primary-container font-label-md text-label-md py-2.5 rounded shadow-sm transition-colors duration-200" type="submit">
                        Create your #Store account
                    </button>
</form>
<div class="mt-stack-lg space-y-stack-md">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                        By creating an account, you agree to #Store's <a class="text-primary hover:underline" href="#">Conditions of Use</a> and <a class="text-primary hover:underline" href="#">Privacy Notice</a>.
                    </p>
<div class="relative flex items-center py-stack-sm">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink mx-4 font-body-sm text-body-sm text-on-surface-variant">or</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- Google SSO Option -->
<button class="w-full flex items-center justify-center gap-stack-sm border border-outline-variant bg-surface-container-lowest hover:bg-surface-container-low text-on-surface font-label-md text-label-md py-2.5 rounded transition-all duration-200" type="button">
<svg class="w-5 h-5" viewBox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                        Continue with Google
                    </button>
<div class="pt-stack-md border-t border-outline-variant">
<p class="font-body-md text-body-md text-on-surface">
                            Already have an account? 
                            <a class="text-primary hover:underline font-bold" href="#">Sign in</a>
</p>
</div>
</div>
</div>
</div>
</main>
<!-- Footer -->
<footer class="bg-surface dark:bg-on-surface w-full py-stack-lg border-t border-outline-variant dark:border-outline flex flex-col items-center gap-stack-sm mt-auto">
<div class="flex flex-wrap justify-center gap-gutter">
<a class="font-body-sm text-body-sm text-on-surface-variant dark:text-outline-variant hover:text-primary dark:hover:text-primary-fixed underline cursor-pointer transition-all" href="#">Conditions of Use</a>
<a class="font-body-sm text-body-sm text-on-surface-variant dark:text-outline-variant hover:text-primary dark:hover:text-primary-fixed underline cursor-pointer transition-all" href="#">Privacy Notice</a>
<a class="font-body-sm text-body-sm text-on-surface-variant dark:text-outline-variant hover:text-primary dark:hover:text-primary-fixed underline cursor-pointer transition-all" href="#">Help</a>
</div>
<div class="mt-stack-sm">

</div>
</footer>



</body></html>
